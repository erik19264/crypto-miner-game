<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 40px;
    }

    button {
      padding: 20px;
      font-size: 20px;
      margin-top: 20px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
    }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<p>Coins: <span id="coins">0</span></p>

<button onclick="mine()">⛏️ Těžit</button>

<script>
let coins = 0;

function mine() {
  coins++;
  document.getElementById("coins").innerText = coins;
}
</script>

</body>
</html>
