<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 20px;
      font-size: 34px;
    }

    h2, h3 {
      margin: 10px 0;
    }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 14px;
      font-size: 15px;
      border-radius: 12px;
      border: none;
      color: white;
      width: 45%;
      min-width: 140px;
    }

    .mine {
      background: #22c55e;
      width: 70%;
      max-width: 300px;
      font-size: 18px;
      padding: 16px;
      margin-top: 20px;
    }

    .upgrade { background: #3b82f6; }
    .reset { background: #ef4444; }
    .boost { background: #f59e0b; }

    /* 🔥 MENŠÍ IKONY */
    .icon {
      font-size: 16px;
      margin-right: 5px;
    }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<h2>Coins: <span id="coins">0</span></h2>
<h3>Coins/sec: <span id="perSecond">0</span></h3>
<h3>Level: <span id="level">1</span></h3>

<button class="mine" onclick="mine()">
  <span class="icon">⛏️</span> Těžit
</button>

<div class="row">
  <button class="upgrade" onclick="buyUpgrade()">
    <span class="icon">⚡</span> Upgrade<br>
    (+1/sec)<br>
    Cost: <span id="cost">10</span>
  </button>

  <button class="upgrade" onclick="buySuperUpgrade()">
    <span class="icon">💎</span> Super<br>
    (+5/sec)<br>
    Cost: <span id="superCost">100</span>
  </button>
</div>

<div class="row">
  <button class="upgrade" onclick="buyAutoClicker()">
    <span class="icon">🤖</span> Auto Miner<br>
    (+10/sec)<br>
    Cost: <span id="autoCost">500</span>
  </button>

  <button id="boostBtn" class="boost" onclick="activateBoost()">
    <span class="icon">🚀</span> Boost
  </button>
</div>

<div class="row">
  <button class="reset" onclick="resetGame()">
    <span class="icon">🗑️</span> Reset hry
  </button>
</div>

<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let perSecond = parseInt(localStorage.getItem("perSecond")) || 0;
let cost = parseInt(localStorage.getItem("cost")) || 10;
let superCost = parseInt(localStorage.getItem("superCost")) || 100;
let autoCost = parseInt(localStorage.getItem("autoCost")) || 500;
let level = parseInt(localStorage.getItem("level")) || 1;

let boostActive = false;
let boostCooldown = false;
let boostMultiplier = 1;
let boostCooldownRemaining = 0;

// OFFLINE PROGRESS
let lastTime = localStorage.getItem("lastTime");
if (lastTime) {
  let now = Date.now();
  let diff = Math.floor((now - lastTime) / 1000);
  coins += diff * perSecond;
}

function update() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("perSecond").innerText = perSecond;
  document.getElementById("cost").innerText = cost;
  document.getElementById("superCost").innerText = superCost;
  document.getElementById("autoCost").innerText = autoCost;
  document.getElementById("level").innerText = level;

  let boostBtn = document.getElementById("boostBtn");
  if (boostActive) {
    boostBtn.innerText = "🚀 Aktivní";
  } else if (boostCooldown) {
    boostBtn.innerText = "⏳ " + boostCooldownRemaining + "s";
  } else {
    boostBtn.innerText = "🚀 Boost";
  }
}

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.setItem("superCost", superCost);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("level", level);
  localStorage.setItem("lastTime", Date.now());
}

function checkLevel() {
  while (coins >= level * 50) {
    level++;
  }
}

function mine() {
  coins += 1 * boostMultiplier;
  checkLevel();
  save();
  update();
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond += 1;
    cost = Math.floor(cost * 1.5);
    checkLevel();
    save();
    update();
  }
}

function buySuperUpgrade() {
  if (coins >= superCost) {
    coins -= superCost;
    perSecond += 5;
    superCost = Math.floor(superCost * 1.7);
    checkLevel();
    save();
    update();
  }
}

function buyAutoClicker() {
  if (coins >= autoCost) {
    coins -= autoCost;
    perSecond += 10;
    autoCost = Math.floor(autoCost * 2);
    checkLevel();
    save();
    update();
  }
}

function resetGame() {
  coins = 0;
  perSecond = 0;
  cost = 10;
  superCost = 100;
  autoCost = 500;
  level = 1;

  localStorage.clear();
  update();
}

function activateBoost() {
  if (boostActive || boostCooldown) return;

  boostActive = true;
  boostCooldown = true;
  boostMultiplier = 2;
  boostCooldownRemaining = 30;
  update();

  setTimeout(() => {
    boostMultiplier = 1;
    boostActive = false;
  }, 10000);

  let interval = setInterval(() => {
    boostCooldownRemaining--;
    update();

    if (boostCooldownRemaining <= 0) {
      clearInterval(interval);
      boostCooldown = false;
      boostCooldownRemaining = 0;
      update();
    }
  }, 1000);
}

setInterval(() => {
  coins += perSecond * boostMultiplier;
  checkLevel();
  save();
  update();
}, 1000);

update();
</script>

</body>
</html>
