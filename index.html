<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Miner</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #020617, #0a1a3a);
  color: white;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  background: #081225;
  border-radius: 25px;
  overflow: hidden;
}

/* TOP */
.top {
  background: #111827;
  padding: 15px;
  text-align: center;
  font-size: 14px;
}

/* TITLE */
.title {
  text-align: center;
  margin-top: 10px;
}

.title h1 {
  margin: 0;
}

.title small {
  opacity: 0.7;
}

/* BOXES */
.boxes {
  display: flex;
  gap: 10px;
  padding: 15px;
}

.box {
  flex: 1;
  background: #1f2937;
  border-radius: 15px;
  padding: 15px;
  text-align: center;
}

/* CIRCLE */
.circle {
  width: 180px;   /* menší */
  height: 180px;
  border-radius: 50%;
  margin: 20px auto;
  background: radial-gradient(circle, #c084fc, #7c3aed);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  cursor: pointer;
  box-shadow: 0 0 40px #7c3aed;
}

/* COINS */
.coins {
  text-align: center;
}

.coins h2 {
  margin: 10px 0;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 420px;
  background: #111827;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
}

.nav button {
  background: none;
  border: none;
  color: white;
  font-size: 14px;
}
</style>

</head>
<body>

<div class="app">

  <div class="top">
    Crypto Miner Empire
  </div>

  <div class="title">
    <h1>Crypto Miner</h1>
    <small>neon edition</small>
  </div>

  <div class="boxes">
    <div class="box">
      Za kliknutí<br>
      <b id="clickValue">+1</b>
    </div>
    <div class="box">
      Energie<br>
      <b id="energyText">100/100</b>
    </div>
  </div>

  <div class="circle" id="mine">
    CM
  </div>

  <div class="coins">
    💎 Zůstatek Coins
    <h2 id="coins">0</h2>
  </div>

</div>

<div class="nav">
  <button>Domů</button>
  <button>Shop</button>
  <button>Bonus</button>
  <button>Výběr</button>
</div>

<script>
let coins = 0;
let energy = 100;
let maxEnergy = 100;
let clickValue = 1;

function update() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("energyText").innerText = energy + "/" + maxEnergy;
  document.getElementById("clickValue").innerText = "+" + clickValue;
}

document.getElementById("mine").onclick = () => {
  if (energy <= 0) return;

  coins += clickValue;
  energy--;

  update();
};

// obnova energie
setInterval(() => {
  if (energy < maxEnergy) {
    energy++;
    update();
  }
}, 500);

// auto income
setInterval(() => {
  coins += 1;
  update();
}, 1000);

update();
</script>

</body>
</html>
