<!DOCTYPE html>
<html lang="cs">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Miner</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      transition: 0.15s;
    }

    h1 {
      font-size: 6vw;
      color: #facc15;
      margin: 10px 0 0 0;
    }

    .subtitle {
      opacity: 0.6;
      margin: 0 0 14px 0;
      letter-spacing: 2px;
    }

    h2, h3, p {
      margin: 10px 0;
    }

    button {
      padding: 12px;
      margin: 6px;
      border: none;
      border-radius: 12px;
      color: white;
      width: 45%;
      font-size: 14px;
      transition: 0.15s;
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      opacity: 0.6;
    }

    .mine { background: #22c55e; width: 70%; }
    .blue { background: #3b82f6; }
    .orange { background: #f59e0b; }
    .red { background: #ef4444; }
    .purple { background: #8b5cf6; }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .screen { display: none; }
    .active { display: block; }

    .barWrap {
      background: #1e293b;
      border-radius: 10px;
      height: 14px;
      width: 82%;
      margin: 10px auto 18px auto;
      overflow: hidden;
    }

    .bar {
      background: #22c55e;
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.2s;
    }

    .topStat {
      background: #1e293b;
      border-radius: 12px;
      padding: 10px;
      width: 80%;
      max-width: 320px;
      margin: 0 auto 15px auto;
      font-size: 15px;
    }

    #effects {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .coinEffect {
      position: absolute;
      font-size: 20px;
      animation: floatUp 1s forwards;
    }

    .critText {
      position: absolute;
      font-size: 22px;
      color: #fb923c;
      font-weight: bold;
      animation: floatUp 1s forwards;
    }

    @keyframes floatUp {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-60px); }
    }

    @media (max-width: 500px) {
      h1 { font-size: 8vw; }
      button { font-size: 13px; padding: 10px; }
    }
  </style>
</head>
<body>

  <div id="effects"></div>

  <audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav"></audio>
  <audio id="upgradeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-power-up-3164.wav"></audio>
  <audio id="levelSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.wav"></audio>

  <div class="topStat">
    👥 Registrovaní hráči: <span id="playersCount">127</span>
  </div>

  <h1>💰 Crypto Miner</h1>
  <p class="subtitle">Empire</p>

  <h2>Coins: <span id="coins">0</span></h2>
  <h3>Diamonds: <span id="diamonds">0</span></h3>
  <h3>Coins/sec: <span id="perSecond">0</span></h3>
  <h3>Level: <span id="level">1</span></h3>
  <p>XP: <span id="xp">0</span> / <span id="xpNeeded">50</span></p>
  <h3>Prestige: <span id="prestige">0</span></h3>

  <div class="barWrap">
    <div id="levelBar" class="bar"></div>
  </div>

  <div class="row">
    <button class="blue" onclick="showScreen('game')">🎮 Hra</button>
    <button class="blue" id="shopBtn" onclick="showScreen('shop')">🛒 Shop</button>
  </div>

  <div id="game" class="screen active">
    <button class="mine" onclick="mine()">⛏️ Těžit</button>

    <div class="row">
      <button class="orange" id="boostBtn" onclick="boost()">🚀 Boost</button>
      <button class="purple" id="dailyBtn" onclick="dailyReward()">🎁 Daily Reward</button>
    </div>

    <div class="row">
      <button class="blue" id="adCoinsBtn" onclick="watchAdCoins()">🎥 +5000 Coins</button>
      <button class="blue" id="adDiamondsBtn" onclick="watchAdDiamonds()">🎥 +1 Diamond</button>
    </div>

    <div class="row">
      <button class="purple" id="rebirthBtn" onclick="rebirth()">♻️ Rebirth</button>
      <button class="red" onclick="resetGame()">🗑️ Reset</button>
    </div>

    <p id="unlockInfo">Odemkni další věci vyšším levelem.</p>
  </div>

  <div id="shop" class="screen">
    <div class="row">
      <button class="blue" onclick="buyUpgrade()">
        ⚡ +1/sec<br>Cost: <span id="cost">10</span>
      </button>

      <button class="blue" onclick="buySuper()">
        💎 +5/sec<br>Cost: <span id="superCost">100</span>
      </button>
    </div>

    <div class="row">
      <button class="blue" onclick="buyAuto()">
        🤖 +10/sec<br>Cost: <span id="autoCost">500</span>
      </button>

      <button class="blue" onclick="buyMega()">
        🏭 +50/sec<br>Cost: <span id="megaCost">5000</span>
      </button>
    </div>

    <div class="row">
      <button class="blue" onclick="buyCoins()">
        💎 +1000 Coins<br>Cost: 1 Diamond
      </button>

      <button class="blue" onclick="buyDiamondBoost()">
        💎 x2 Boost 30s<br>Cost: 2 Diamonds
      </button>
    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);

    const clickSound = el("clickSound");
    const upgradeSound = el("upgradeSound");
    const levelSound = el("levelSound");

    let coins = parseFloat(localStorage.getItem("coins")) || 0;
    let diamonds = parseInt(localStorage.getItem("diamonds")) || 0;
    let perSecond = parseFloat(localStorage.getItem("perSecond")) || 0;

    let cost = parseFloat(localStorage.getItem("cost")) || 10;
    let superCost = parseFloat(localStorage.getItem("superCost")) || 100;
    let autoCost = parseFloat(localStorage.getItem("autoCost")) || 500;
    let megaCost = parseFloat(localStorage.getItem("megaCost")) || 5000;

    let level = parseInt(localStorage.getItem("level")) || 1;
    let prestige = parseInt(localStorage.getItem("prestige")) || 0;

    let xp = parseInt(localStorage.getItem("xp")) || 0;
    let xpNeeded = parseInt(localStorage.getItem("xpNeeded")) || 50;

    let boostMultiplier = 1;
    let boostCooldownUntil = parseInt(localStorage.getItem("boostCooldownUntil")) || 0;
    let boostEndUntil = parseInt(localStorage.getItem("boostEndUntil")) || 0;

    let critChance = 0.15;
    let critMultiplier = 5;

    let lastDaily = parseInt(localStorage.getItem("lastDaily")) || 0;
    let lastTime = parseInt(localStorage.getItem("lastTime")) || Date.now();

    let adCoinsCooldownUntil = parseInt(localStorage.getItem("adCoinsCooldownUntil")) || 0;
    let adDiamondsCooldownUntil = parseInt(localStorage.getItem("adDiamondsCooldownUntil")) || 0;

    function playSound(audioEl) {
      audioEl.currentTime = 0;
      audioEl.play().catch(() => {});
    }

    function save() {
      localStorage.setItem("coins", coins);
      localStorage.setItem("diamonds", diamonds);
      localStorage.setItem("perSecond", perSecond);
      localStorage.setItem("cost", cost);
      localStorage.setItem("superCost", superCost);
      localStorage.setItem("autoCost", autoCost);
      localStorage.setItem("megaCost", megaCost);
      localStorage.setItem("level", level);
      localStorage.setItem("prestige", prestige);
      localStorage.setItem("xp", xp);
      localStorage.setItem("xpNeeded", xpNeeded);
      localStorage.setItem("lastDaily", lastDaily);
      localStorage.setItem("lastTime", Date.now());
      localStorage.setItem("boostCooldownUntil", boostCooldownUntil);
      localStorage.setItem("boostEndUntil", boostEndUntil);
      localStorage.setItem("adCoinsCooldownUntil", adCoinsCooldownUntil);
      localStorage.setItem("adDiamondsCooldownUntil", adDiamondsCooldownUntil);
    }

    function showScreen(id) {
      if (id === "shop" && level < 5) return;
      ["game", "shop"].forEach(screen => el(screen).classList.remove("active"));
      el(id).classList.add("active");
    }

    function currentIncomeMultiplier() {
      return boostMultiplier * (1 + prestige * 0.2);
    }

    function showCoinEffect(text = "💰", crit = false) {
      const effect = document.createElement("div");
      effect.className = crit ? "critText" : "coinEffect";
      effect.innerText = text;
      effect.style.left = Math.random() * (window.innerWidth - 80) + "px";
      effect.style.top = "60%";
      el("effects").appendChild(effect);
      setTimeout(() => effect.remove(), 1000);
    }

    function levelUpEffect() {
      document.body.style.background = "#14532d";
      setTimeout(() => {
        document.body.style.background = "#0f172a";
      }, 150);
    }

    function checkUnlocks() {
      const shopBtn = el("shopBtn");
      const boostBtn = el("boostBtn");
      const adCoinsBtn = el("adCoinsBtn");
      const adDiamondsBtn = el("adDiamondsBtn");
      const rebirthBtn = el("rebirthBtn");
      const unlockInfo = el("unlockInfo");

      if (level < 5) {
        shopBtn.innerText = "🔒 Shop (lvl 5)";
        shopBtn.disabled = true;
      } else {
        shopBtn.innerText = "🛒 Shop";
        shopBtn.disabled = false;
      }

      if (level < 10) {
        boostBtn.innerText = "🔒 Boost (lvl 10)";
        boostBtn.disabled = true;
      } else {
        boostBtn.disabled = false;
        const now = Date.now();
        const left = Math.ceil((boostCooldownUntil - now) / 1000);
        boostBtn.innerText = now < boostEndUntil ? "🚀 Aktivní" : (left > 0 ? "⏳ " + left + "s" : "🚀 Boost");
      }

      if (level < 20) {
        adCoinsBtn.innerText = "🔒 Reklama (lvl 20)";
        adDiamondsBtn.innerText = "🔒 Reklama (lvl 20)";
        adCoinsBtn.disabled = true;
        adDiamondsBtn.disabled = true;
      } else {
        const now = Date.now();
        const adCoinsLeft = Math.ceil((adCoinsCooldownUntil - now) / 1000);
        adCoinsBtn.innerText = adCoinsLeft > 0 ? "⏳ " + adCoinsLeft + "s" : "🎥 +5000 Coins";
        adCoinsBtn.disabled = adCoinsLeft > 0;

        const adDiamondsLeft = Math.ceil((adDiamondsCooldownUntil - now) / 1000);
        adDiamondsBtn.innerText = adDiamondsLeft > 0 ? "⏳ " + adDiamondsLeft + "s" : "🎥 +1 Diamond";
        adDiamondsBtn.disabled = adDiamondsLeft > 0;
      }

      if (level < 50) {
        rebirthBtn.innerText = "🔒 Rebirth (lvl 50)";
        rebirthBtn.disabled = true;
      } else {
        rebirthBtn.innerText = "♻️ Rebirth";
        rebirthBtn.disabled = false;
      }

      if (level < 5) {
        unlockInfo.innerText = "Další odemčení: Shop na levelu 5";
      } else if (level < 10) {
        unlockInfo.innerText = "Další odemčení: Boost na levelu 10";
      } else if (level < 20) {
        unlockInfo.innerText = "Další odemčení: Reklamy na levelu 20";
      } else if (level < 50) {
        unlockInfo.innerText = "Další odemčení: Rebirth na levelu 50";
      } else {
        unlockInfo.innerText = "Máš odemčeno všechno v základní verzi.";
      }
    }

    function updateLevelBar() {
      let progress = (xp / xpNeeded) * 100;
      if (progress < 0) progress = 0;
      if (progress > 100) progress = 100;
      el("levelBar").style.width = progress + "%";
    }

    function updateDailyButton() {
      const remaining = 86400000 - (Date.now() - lastDaily);

      if (remaining <= 0) {
        el("dailyBtn").innerText = "🎁 Daily Reward";
        el("dailyBtn").disabled = false;
      } else {
        const h = Math.floor(remaining / 3600000);
        const m = Math.floor((remaining % 3600000) / 60000);
        el("dailyBtn").innerText = "⏳ " + h + "h " + m + "m";
        el("dailyBtn").disabled = true;
      }
    }

    function update() {
      el("coins").innerText = Math.floor(coins);
      el("diamonds").innerText = diamonds;
      el("perSecond").innerText = Math.floor(perSecond * 100) / 100;
      el("level").innerText = level;
      el("prestige").innerText = prestige;
      el("xp").innerText = xp;
      el("xpNeeded").innerText = xpNeeded;

      el("cost").innerText = Math.floor(cost);
      el("superCost").innerText = Math.floor(superCost);
      el("autoCost").innerText = Math.floor(autoCost);
      el("megaCost").innerText = Math.floor(megaCost);

      updateLevelBar();
      updateDailyButton();
      checkUnlocks();
    }

    function checkLevel() {
      while (xp >= xpNeeded) {
        xp -= xpNeeded;
        level++;
        xpNeeded = Math.floor(xpNeeded * 1.4);

        playSound(levelSound);
        levelUpEffect();

        if (level % 10 === 0) {
          diamonds += 1;
        }
      }
    }

    function mine() {
      let amount = 1 * currentIncomeMultiplier();
      xp += 1;

      if (Math.random() < critChance) {
        amount *= critMultiplier;
        document.body.style.background = "#78350f";
        showCoinEffect("CRIT!", true);
        setTimeout(() => {
          document.body.style.background = "#0f172a";
        }, 100);
      } else {
        showCoinEffect("💰");
      }

      coins += amount;

      if (navigator.vibrate) navigator.vibrate(20);

      playSound(clickSound);
      checkLevel();
      save();
      update();
    }

    function buyUpgrade() {
      if (coins >= cost) {
        coins -= cost;
        perSecond += 1;
        cost = Math.floor(cost * 1.5);
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function buySuper() {
      if (coins >= superCost) {
        coins -= superCost;
        perSecond += 5;
        superCost = Math.floor(superCost * 1.7);
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function buyAuto() {
      if (coins >= autoCost) {
        coins -= autoCost;
        perSecond += 10;
        autoCost = Math.floor(autoCost * 2);
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function buyMega() {
      if (coins >= megaCost) {
        coins -= megaCost;
        perSecond += 50;
        megaCost = Math.floor(megaCost * 2.2);
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function buyCoins() {
      if (diamonds >= 1) {
        diamonds--;
        coins += 1000;
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function buyDiamondBoost() {
      if (diamonds >= 2) {
        diamonds -= 2;
        boostEndUntil = Date.now() + 30000;
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function boost() {
      const now = Date.now();
      if (level < 10) return;
      if (now < boostCooldownUntil || now < boostEndUntil) return;

      boostEndUntil = now + 10000;
      boostCooldownUntil = now + 30000;
      playSound(upgradeSound);
      save();
      update();
    }

    function dailyReward() {
      if (Date.now() - lastDaily >= 86400000) {
        coins += 5000;
        diamonds += 1;
        lastDaily = Date.now();
        playSound(upgradeSound);
        save();
        update();
      }
    }

    function watchAdCoins() {
      const now = Date.now();
      if (level < 20) return;
      if (now < adCoinsCooldownUntil) return;

      coins += 5000 * (1 + prestige * 0.2);
      adCoinsCooldownUntil = now + 60000;
      playSound(upgradeSound);
      save();
      update();
    }

    function watchAdDiamonds() {
      const now = Date.now();
      if (level < 20) return;
      if (now < adDiamondsCooldownUntil) return;

      diamonds += 1;
      adDiamondsCooldownUntil = now + 120000;
      playSound(upgradeSound);
      save();
      update();
    }

    function rebirth() {
      if (level < 50) return;
      if (coins < 100000) {
        alert("Potřebuješ 100 000 coins!");
        return;
      }

      prestige++;
      coins = 0;
      perSecond = 0;
      cost = 10;
      superCost = 100;
      autoCost = 500;
      megaCost = 5000;
      level = 1;
      xp = 0;
      xpNeeded = 50;
      boostEndUntil = 0;
      boostCooldownUntil = 0;

      playSound(levelSound);
      save();
      update();
    }

    function resetGame() {
      localStorage.clear();
      location.reload();
    }

    {
      const now = Date.now();
      const diff = Math.floor((now - lastTime) / 1000);
      if (diff > 0) {
        coins += diff * perSecond * (1 + prestige * 0.2);
      }
    }

    setInterval(() => {
      const now = Date.now();
      boostMultiplier = now < boostEndUntil ? 2 : 1;

      coins += perSecond * currentIncomeMultiplier();
      save();
      update();
    }, 1000);

    setInterval(update, 1000);

    update();
  </script>

</body>
</html>
