<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crypto Miner Empire</title>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
      font-size: 34px;
    }

    h2, h3 {
      margin: 10px 0;
    }

    button {
      padding: 12px;
      margin: 6px;
      border-radius: 12px;
      border: none;
      color: white;
      width: 45%;
      font-size: 14px;
    }

    .mine {
      background: #22c55e;
      width: 70%;
      max-width: 320px;
      font-size: 18px;
      padding: 16px;
    }

    .blue { background: #3b82f6; }
    .orange { background: #f59e0b; }
    .red { background: #ef4444; }
    .purple { background: #8b5cf6; }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .screen {
      display: none;
    }

    .active {
      display: block;
    }

    .barWrap {
      background: #1e293b;
      border-radius: 10px;
      height: 12px;
      width: 80%;
      margin: 10px auto 18px auto;
      overflow: hidden;
    }

    .bar {
      background: #22c55e;
      height: 100%;
      width: 0%;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <h1>💰 Crypto Miner Empire</h1>

  <h2>Coins: <span id="coins">0</span></h2>
  <h3>Diamonds: <span id="diamonds">0</span></h3>
  <h3>Coins/sec: <span id="perSecond">0</span></h3>
  <h3>Level: <span id="level">1</span></h3>
  <h3>Prestige: <span id="prestige">0</span></h3>

  <div class="barWrap">
    <div id="levelBar" class="bar"></div>
  </div>

  <div class="row">
    <button class="blue" onclick="showGame()">🎮 Hra</button>
    <button class="blue" onclick="showShop()">🛒 Shop</button>
  </div>

  <div id="game" class="screen active">
    <button class="mine" onclick="mine()">⛏️ Těžit</button>

    <div class="row">
      <button class="orange" id="boostBtn" onclick="boost()">🚀 Boost</button>
      <button class="purple" id="dailyBtn" onclick="daily()">🎁 Daily Reward</button>
    </div>

    <div class="row">
      <button class="purple" onclick="rebirth()">♻️ Rebirth</button>
      <button class="red" onclick="resetGame()">🗑️ Reset</button>
    </div>

    <p>Rebirth vyžaduje 100 000 coins a dá ti +20 % income navždy.</p>
  </div>

  <div id="shop" class="screen">
    <div class="row">
      <button class="blue" onclick="buyUpgrade()">
        ⚡ +1/sec<br>Cost: <span id="cost">10</span>
      </button>

      <button class="blue" onclick="buySuper()">
        💎 +5/sec<br>Cost: <span id="superCost">100</span>
      </button>
    </div>

    <div class="row">
      <button class="blue" onclick="buyAuto()">
        🤖 +10/sec<br>Cost: <span id="autoCost">500</span>
      </button>
    </div>

    <div class="row">
      <button class="blue" onclick="buyCoins()">
        💎 +1000 Coins<br>Cost: 1 Diamond
      </button>

      <button class="blue" onclick="buyDiamondBoost()">
        💎 x2 Boost 30s<br>Cost: 2 Diamonds
      </button>
    </div>
  </div>

  <script>
    let coins = +localStorage.coins || 0;
    let diamonds = +localStorage.diamonds || 0;
    let perSecond = +localStorage.perSecond || 0;

    let cost = +localStorage.cost || 10;
    let superCost = +localStorage.superCost || 100;
    let autoCost = +localStorage.autoCost || 500;

    let level = +localStorage.level || 1;
    let prestige = +localStorage.prestige || 0;

    let boostMultiplier = 1;
    let boostActive = false;
    let boostCooldown = false;
    let boostCooldownRemaining = 0;

    let lastDaily = +localStorage.lastDaily || 0;
    let lastTime = +localStorage.lastTime || Date.now();

    function showGame() {
      game.classList.add("active");
      shop.classList.remove("active");
    }

    function showShop() {
      shop.classList.add("active");
      game.classList.remove("active");
    }

    function update() {
      coinsEl.innerText = Math.floor(coins);
      diamondsEl.innerText = diamonds;
      perSecondEl.innerText = perSecond;
      levelEl.innerText = level;
      prestigeEl.innerText = prestige;

      costEl.innerText = Math.floor(cost);
      superCostEl.innerText = Math.floor(superCost);
      autoCostEl.innerText = Math.floor(autoCost);

      let prevNeed = (level - 1) * 50;
      let nextNeed = level * 50;
      let progress = ((coins - prevNeed) / (nextNeed - prevNeed)) * 100;
      if (progress < 0) progress = 0;
      if (progress > 100) progress = 100;
      levelBar.style.width = progress + "%";

      if (boostActive) {
        boostBtn.innerText = "🚀 Aktivní";
      } else if (boostCooldown) {
        boostBtn.innerText = "⏳ " + boostCooldownRemaining + "s";
      } else {
        boostBtn.innerText = "🚀 Boost";
      }

      let remaining = 86400000 - (Date.now() - lastDaily);
      if (remaining <= 0) {
        dailyBtn.innerText = "🎁 Daily Reward";
        dailyBtn.disabled = false;
        dailyBtn.style.opacity = "1";
      } else {
        let h = Math.floor(remaining / 3600000);
        let m = Math.floor((remaining % 3600000) / 60000);
        dailyBtn.innerText = "⏳ " + h + "h " + m + "m";
        dailyBtn.disabled = true;
        dailyBtn.style.opacity = "0.7";
      }
    }

    function save() {
      localStorage.coins = coins;
      localStorage.diamonds = diamonds;
      localStorage.perSecond = perSecond;

      localStorage.cost = cost;
      localStorage.superCost = superCost;
      localStorage.autoCost = autoCost;

      localStorage.level = level;
      localStorage.prestige = prestige;
      localStorage.lastDaily = lastDaily;
      localStorage.lastTime = Date.now();
    }

    function checkLevel() {
      while (coins >= level * 50) {
        level++;
        if (level % 50 === 0) {
          diamonds++;
        }
      }
    }

    function mine() {
      coins += 1 * boostMultiplier * (1 + prestige * 0.2);
      checkLevel();
      save();
      update();
    }

    function buyUpgrade() {
      if (coins >= cost) {
        coins -= cost;
        perSecond += 1;
        cost = Math.floor(cost * 1.5);
        save();
        update();
      }
    }

    function buySuper() {
      if (coins >= superCost) {
        coins -= superCost;
        perSecond += 5;
        superCost = Math.floor(superCost * 1.7);
        save();
        update();
      }
    }

    function buyAuto() {
      if (coins >= autoCost) {
        coins -= autoCost;
        perSecond += 10;
        autoCost = Math.floor(autoCost * 2);
        save();
        update();
      }
    }

    function buyCoins() {
      if (diamonds >= 1) {
        diamonds--;
        coins += 1000;
        checkLevel();
        save();
        update();
      }
    }

    function buyDiamondBoost() {
      if (diamonds >= 2) {
        diamonds -= 2;
        boostMultiplier = 2;
        boostActive = true;
        save();
        update();

        setTimeout(() => {
          boostMultiplier = 1;
          boostActive = false;
          save();
          update();
        }, 30000);
      }
    }

    function daily() {
      if (Date.now() - lastDaily >= 86400000) {
        coins += 5000;
        diamonds += 1;
        lastDaily = Date.now();
        checkLevel();
        save();
        update();
      }
    }

    function boost() {
      if (boostActive || boostCooldown) return;

      boostActive = true;
      boostCooldown = true;
      boostMultiplier = 2;
      boostCooldownRemaining = 30;
      update();

      setTimeout(() => {
        boostMultiplier = 1;
        boostActive = false;
        save();
        update();
      }, 10000);

      let interval = setInterval(() => {
        boostCooldownRemaining--;

        if (boostCooldownRemaining <= 0) {
          clearInterval(interval);
          boostCooldown = false;
          boostCooldownRemaining = 0;
        }

        update();
      }, 1000);
    }

    function rebirth() {
      if (coins < 100000) {
        alert("Potřebuješ 100 000 coins!");
        return;
      }

      prestige++;
      coins = 0;
      perSecond = 0;
      cost = 10;
      superCost = 100;
      autoCost = 500;
      level = 1;
      boostMultiplier = 1;
      boostActive = false;
      boostCooldown = false;
      boostCooldownRemaining = 0;

      save();
      update();
    }

    function resetGame() {
      localStorage.clear();
      location.reload();
    }

    // offline income
    {
      let now = Date.now();
      let diff = Math.floor((now - lastTime) / 1000);
      if (diff > 0) {
        coins += diff * perSecond * (1 + prestige * 0.2);
        checkLevel();
      }
    }

    setInterval(() => {
      coins += perSecond * boostMultiplier * (1 + prestige * 0.2);
      checkLevel();
      save();
      update();
    }, 1000);

    setInterval(() => {
      update();
    }, 60000);

    update();
  </script>

</body>
</html>
