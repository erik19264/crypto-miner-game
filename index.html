<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
    }

    h2, h3 {
      margin: 14px 0;
    }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    button {
      padding: 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      color: white;
      width: 45%;
      min-width: 150px;
    }

    .mine {
      background: #22c55e;
      width: 70%;
      max-width: 320px;
      font-size: 20px;
      padding: 18px;
      margin-top: 20px;
    }

    .upgrade {
      background: #3b82f6;
    }

    .reset {
      background: #ef4444;
    }

    .boost {
      background: #f59e0b;
    }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<h2>Coins: <span id="coins">0</span></h2>
<h3>Coins/sec: <span id="perSecond">0</span></h3>
<h3>Level: <span id="level">1</span></h3>

<button class="mine" onclick="mine()">⛏️ Těžit</button>

<div class="row">
  <button class="upgrade" onclick="buyUpgrade()">
    ⚡ Upgrade<br>(+1/sec)<br>Cost: <span id="cost">10</span>
  </button>

  <button class="upgrade" onclick="buySuperUpgrade()">
    💎 Super<br>(+5/sec)<br>Cost: <span id="superCost">100</span>
  </button>
</div>

<div class="row">
  <button class="upgrade" onclick="buyAutoClicker()">
    🤖 Auto Miner<br>(+10/sec)<br>Cost: <span id="autoCost">500</span>
  </button>

  <button id="boostBtn" class="boost" onclick="activateBoost()">
    🚀 Boost
  </button>
</div>

<div class="row">
  <button class="reset" onclick="resetGame()">🗑 Reset hry</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
let tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
if (tg) {
  tg.expand();
}

let user = tg && tg.initDataUnsafe ? tg.initDataUnsafe.user : null;
let userId = user ? user.id : "guest";

let coins = parseInt(localStorage.getItem("coins_" + userId)) || 0;
let perSecond = parseInt(localStorage.getItem("perSecond_" + userId)) || 0;
let cost = parseInt(localStorage.getItem("cost_" + userId)) || 10;
let superCost = parseInt(localStorage.getItem("superCost_" + userId)) || 100;
let autoCost = parseInt(localStorage.getItem("autoCost_" + userId)) || 500;
let level = parseInt(localStorage.getItem("level_" + userId)) || 1;

let boostActive = false;
let boostCooldown = false;
let boostMultiplier = 1;
let boostCooldownRemaining = 0;

// offline earnings
let lastTime = localStorage.getItem("lastTime_" + userId);
if (lastTime) {
  let now = Date.now();
  let diff = Math.floor((now - parseInt(lastTime)) / 1000);
  coins += diff * perSecond;
}

function update() {
  document.getElementById("coins").innerText = coins;
  document.getElementById("perSecond").innerText = perSecond;
  document.getElementById("cost").innerText = cost;
  document.getElementById("superCost").innerText = superCost;
  document.getElementById("autoCost").innerText = autoCost;
  document.getElementById("level").innerText = level;

  const boostBtn = document.getElementById("boostBtn");
  if (boostActive) {
    boostBtn.innerText = "🚀 Aktivní";
  } else if (boostCooldown) {
    boostBtn.innerText = "⏳ " + boostCooldownRemaining + "s";
  } else {
    boostBtn.innerText = "🚀 Boost";
  }
}

function checkLevel() {
  while (coins >= level * 50) {
    level++;
  }
}

function save() {
  localStorage.setItem("coins_" + userId, coins);
  localStorage.setItem("perSecond_" + userId, perSecond);
  localStorage.setItem("cost_" + userId, cost);
  localStorage.setItem("superCost_" + userId, superCost);
  localStorage.setItem("autoCost_" + userId, autoCost);
  localStorage.setItem("level_" + userId, level);
  localStorage.setItem("lastTime_" + userId, Date.now());
  update();
}

function mine() {
  coins += 1 * boostMultiplier;
  checkLevel();
  save();
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond += 1;
    cost = Math.floor(cost * 1.5);
    checkLevel();
    save();
  }
}

function buySuperUpgrade() {
  if (coins >= superCost) {
    coins -= superCost;
    perSecond += 5;
    superCost = Math.floor(superCost * 1.7);
    checkLevel();
    save();
  }
}

function buyAutoClicker() {
  if (coins >= autoCost) {
    coins -= autoCost;
    perSecond += 10;
    autoCost = Math.floor(autoCost * 2);
    checkLevel();
    save();
  }
}

function resetGame() {
  coins = 0;
  perSecond = 0;
  cost = 10;
  superCost = 100;
  autoCost = 500;
  level = 1;
  boostActive = false;
  boostCooldown = false;
  boostMultiplier = 1;
  boostCooldownRemaining = 0;

  localStorage.setItem("coins_" + userId, coins);
  localStorage.setItem("perSecond_" + userId, perSecond);
  localStorage.setItem("cost_" + userId, cost);
  localStorage.setItem("superCost_" + userId, superCost);
  localStorage.setItem("autoCost_" + userId, autoCost);
  localStorage.setItem("level_" + userId, level);
  localStorage.removeItem("lastTime_" + userId);

  update();
}

function activateBoost() {
  if (boostActive || boostCooldown) return;

  boostActive = true;
  boostCooldown = true;
  boostMultiplier = 2;
  boostCooldownRemaining = 30;
  update();

  setTimeout(() => {
    boostMultiplier = 1;
    boostActive = false;
    update();
  }, 10000);

  const cooldownTimer = setInterval(() => {
    boostCooldownRemaining--;
    update();

    if (boostCooldownRemaining <= 0) {
      clearInterval(cooldownTimer);
      boostCooldown = false;
      boostCooldownRemaining = 0;
      update();
    }
  }, 1000);
}

setInterval(() => {
  coins += perSecond * boostMultiplier;
  checkLevel();
  save();
}, 1000);

checkLevel();
update();
</script>

</body>
</html>
