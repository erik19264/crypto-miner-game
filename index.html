<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Miner Empire</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #111827;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game {
      width: 100%;
      max-width: 420px;
      background: #1f2937;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0 0 20px;
      text-align: center;
      font-size: 28px;
    }

    .stats {
      background: #111827;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
      text-align: center;
    }

    .btc {
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .bps {
      font-size: 18px;
      opacity: 0.9;
    }

    .section {
      margin-top: 16px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-upgrade {
      background: linear-gradient(180deg, #16a34a, #15803d);
      color: white;
      box-shadow: 0 6px 0 #0f5c2b;
    }

    .btn-upgrade:disabled {
      background: #4b5563;
      box-shadow: 0 6px 0 #374151;
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-invite {
      background: linear-gradient(180deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 0 6px 0 #1e3a8a;
    }

    .card {
      background: #111827;
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .small {
      font-size: 14px;
      opacity: 0.85;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Crypto Miner Empire</h1>

    <div class="stats">
      <div class="btc" id="btcText">BTC: 0</div>
      <div class="bps" id="bpsText">BTC/s: 1</div>
    </div>

    <div class="section">
      <button class="btn btn-upgrade" id="upgradeBtn">
        UPGRADE +1 BTC/s<br>
        <span id="upgradeCostText">COST: 10 BTC</span>
      </button>

      <button class="btn btn-invite" id="inviteBtn">
        POZVAT KAMARÁDY
      </button>
    </div>

    <div class="card small">
      Těžba běží automaticky. Upgrade zvyšuje BTC za sekundu a cena se po každém nákupu zdvojnásobí.
    </div>
  </div>

  <script>
    const SAVE_KEY = "crypto_miner_empire_save_v1";

    let game = {
      btc: 0,
      btcPerSecond: 1,
      upgradeCost: 10
    };

    function loadGame() {
      const saved = localStorage.getItem(SAVE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        if (typeof parsed.btc === "number") game.btc = parsed.btc;
        if (typeof parsed.btcPerSecond === "number") game.btcPerSecond = parsed.btcPerSecond;
        if (typeof parsed.upgradeCost === "number") game.upgradeCost = parsed.upgradeCost;
      } catch (error) {
        console.error("Chyba při načítání uložené hry:", error);
      }
    }

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(game));
    }

    function formatNumber(value) {
      if (value >= 1_000_000_000) return (value / 1_000_000_000).toFixed(2) + "B";
      if (value >= 1_000_000) return (value / 1_000_000).toFixed(2) + "M";
      if (value >= 1_000) return (value / 1_000).toFixed(2) + "K";
      return Math.floor(value).toString();
    }

    function updateUI() {
      document.getElementById("btcText").textContent = "BTC: " + formatNumber(game.btc);
      document.getElementById("bpsText").textContent = "BTC/s: " + formatNumber(game.btcPerSecond);
      document.getElementById("upgradeCostText").textContent = "COST: " + formatNumber(game.upgradeCost) + " BTC";

      const upgradeBtn = document.getElementById("upgradeBtn");
      upgradeBtn.disabled = game.btc < game.upgradeCost;
    }

    function tick() {
      game.btc += game.btcPerSecond;
      updateUI();
    }

    function buyUpgrade() {
      if (game.btc < game.upgradeCost) return;

      game.btc -= game.upgradeCost;
      game.btcPerSecond += 1;
      game.upgradeCost *= 2;

      updateUI();
      saveGame();
    }

    function openInviteLink() {
      const inviteUrl = "https://google.com";
      window.open(inviteUrl, "_blank");
    }

    document.getElementById("upgradeBtn").addEventListener("click", buyUpgrade);
    document.getElementById("inviteBtn").addEventListener("click", openInviteLink);

    loadGame();
    updateUI();

    setInterval(() => {
      tick();
      saveGame();
    }, 1000);
  </script>
</body>
</html>
