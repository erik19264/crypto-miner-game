<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-top: 30px;
      font-size: 42px;
    }

    h2, h3 {
      margin: 18px 0;
    }

    button {
      padding: 18px;
      font-size: 18px;
      margin: 10px;
      border-radius: 14px;
      border: none;
      color: white;
      min-width: 260px;
    }

    .mine {
      background: #22c55e;
    }

    .upgrade {
      background: #3b82f6;
    }

    .reset {
      background: #ef4444;
    }

    .boost {
      background: #f59e0b;
    }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<h2 id="coins">Coins: 0</h2>
<h3 id="perSec">Coins/sec: 0</h3>
<h3 id="level">Level: 1</h3>

<button class="mine" onclick="mine()">⛏️ Těžit</button>

<br>

<button class="upgrade" onclick="buyUpgrade()">
  ⚡ Upgrade (+1/sec) – Cost: <span id="cost">10</span>
</button>

<br>

<button class="upgrade" onclick="buySuperUpgrade()">
  💎 Super Upgrade (+5/sec) – Cost: <span id="superCost">100</span>
</button>

<br>

<button class="reset" onclick="resetGame()">🗑️ Reset hry</button>

<br>

<button class="boost" onclick="activateBoost()">🚀 x2 Boost (10s)</button>

<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let perSecond = parseInt(localStorage.getItem("perSecond")) || 0;
let cost = parseInt(localStorage.getItem("cost")) || 10;
let superCost = parseInt(localStorage.getItem("superCost")) || 100;
let level = parseInt(localStorage.getItem("level")) || 1;

let boostActive = false;
let boostMultiplier = 1;

// offline earnings
let lastTime = localStorage.getItem("lastTime");
if (lastTime) {
  let now = Date.now();
  let diff = Math.floor((now - parseInt(lastTime)) / 1000);
  coins += diff * perSecond;
}

function update() {
  document.getElementById("coins").innerText = "Coins: " + coins;
  document.getElementById("perSec").innerText = "Coins/sec: " + perSecond;
  document.getElementById("cost").innerText = cost;
  document.getElementById("superCost").innerText = superCost;
  document.getElementById("level").innerText = "Level: " + level;
}

function checkLevel() {
  while (coins >= level * 50) {
    level++;
  }
}

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.setItem("superCost", superCost);
  localStorage.setItem("level", level);
  localStorage.setItem("lastTime", Date.now());
  update();
}

function mine() {
  coins += 1 * boostMultiplier;
  checkLevel();
  save();
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond += 1;
    cost = Math.floor(cost * 1.5);
    checkLevel();
    save();
  }
}

function buySuperUpgrade() {
  if (coins >= superCost) {
    coins -= superCost;
    perSecond += 5;
    superCost = Math.floor(superCost * 1.7);
    checkLevel();
    save();
  }
}

function resetGame() {
  coins = 0;
  perSecond = 0;
  cost = 10;
  superCost = 100;
  level = 1;
  boostActive = false;
  boostMultiplier = 1;

  localStorage.setItem("coins", coins);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.setItem("superCost", superCost);
  localStorage.setItem("level", level);
  localStorage.removeItem("lastTime");

  update();
}

function activateBoost() {
  if (boostActive) return;

  boostActive = true;
  boostMultiplier = 2;

  setTimeout(() => {
    boostMultiplier = 1;
    boostActive = false;
  }, 10000);
}

setInterval(() => {
  coins += perSecond * boostMultiplier;
  checkLevel();
  save();
}, 1000);

checkLevel();
update();
</script>

</body>
</html>
