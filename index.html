<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Miner</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
  margin: 0;
  padding: 20px;
}

/* NADPIS */
@keyframes glow {
  0% { text-shadow: 0 0 5px #facc15; }
  50% { text-shadow: 0 0 25px #facc15; }
  100% { text-shadow: 0 0 5px #facc15; }
}

h1 {
  font-size: 6vw;
  white-space: nowrap;
  color: #facc15;
  animation: glow 2s infinite;
}

.subtitle {
  opacity: 0.6;
  margin-top: -10px;
  letter-spacing: 2px;
}

/* BUTTONY */
button {
  padding: 12px;
  margin: 6px;
  border-radius: 12px;
  border: none;
  color: white;
  width: 45%;
  transition: 0.15s;
}

button:active {
  transform: scale(0.95);
}

.mine { background: #22c55e; width: 70%; }
.blue { background: #3b82f6; }
.orange { background: #f59e0b; }
.red { background: #ef4444; }
.purple { background: #8b5cf6; }

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

/* BAR */
.barWrap {
  background: #1e293b;
  height: 12px;
  width: 80%;
  margin: 10px auto;
  border-radius: 10px;
}

.bar {
  background: #22c55e;
  height: 100%;
  width: 0%;
  border-radius: 10px;
}

/* EFEKTY */
#effects {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.coinEffect {
  position: absolute;
  font-size: 20px;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-60px); }
}
</style>
</head>

<body>

<div id="effects"></div>

<h1>💰 Crypto Miner</h1>
<p class="subtitle">Empire</p>

<h2>Coins: <span id="coins">0</span></h2>
<h3>Diamonds: <span id="diamonds">0</span></h3>
<h3>Coins/sec: <span id="perSecond">0</span></h3>
<h3>Level: <span id="level">1</span></h3>
<h3>Prestige: <span id="prestige">0</span></h3>

<div class="barWrap">
  <div id="levelBar" class="bar"></div>
</div>

<button class="mine" onclick="mine()">⛏️ Těžit</button>

<div class="row">
  <button class="orange" onclick="boost()">🚀 Boost</button>
  <button class="purple" onclick="daily()">🎁 Daily</button>
</div>

<div class="row">
  <button class="blue" onclick="watchAdCoins()">🎥 +5000</button>
  <button class="blue" onclick="watchAdDiamonds()">🎥 +1 💎</button>
</div>

<div class="row">
  <button class="purple" onclick="rebirth()">♻️ Rebirth</button>
  <button class="red" onclick="resetGame()">🗑️ Reset</button>
</div>

<div class="row">
  <button class="blue" onclick="buyUpgrade()">+1/sec (<span id="cost">10</span>)</button>
  <button class="blue" onclick="buySuper()">+5/sec (<span id="superCost">100</span>)</button>
</div>

<div class="row">
  <button class="blue" onclick="buyAuto()">+10/sec (<span id="autoCost">500</span>)</button>
</div>

<script>
let coins = 0;
let diamonds = 0;
let perSecond = 0;

let cost = 10;
let superCost = 100;
let autoCost = 500;

let level = 1;
let prestige = 0;

let boostMultiplier = 1;

function update() {
  coinsEl.innerText = Math.floor(coins);
  diamondsEl.innerText = diamonds;
  perSecondEl.innerText = perSecond;
  levelEl.innerText = level;
  prestigeEl.innerText = prestige;

  costEl.innerText = cost;
  superCostEl.innerText = superCost;
  autoCostEl.innerText = autoCost;

  levelBar.style.width = (coins % 50) * 2 + "%";
}

const coinsEl = document.getElementById("coins");
const diamondsEl = document.getElementById("diamonds");
const perSecondEl = document.getElementById("perSecond");
const levelEl = document.getElementById("level");
const prestigeEl = document.getElementById("prestige");

const costEl = document.getElementById("cost");
const superCostEl = document.getElementById("superCost");
const autoCostEl = document.getElementById("autoCost");

const levelBar = document.getElementById("levelBar");

function showCoinEffect() {
  const el = document.createElement("div");
  el.className = "coinEffect";
  el.innerText = "💰";
  el.style.left = Math.random() * window.innerWidth + "px";
  el.style.top = "60%";
  document.getElementById("effects").appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function levelUpEffect() {
  document.body.style.background = "#14532d";
  setTimeout(() => {
    document.body.style.background = "#0f172a";
  }, 150);
}

function mine() {
  coins += 1 * boostMultiplier;
  showCoinEffect();
  checkLevel();
  update();
}

function checkLevel() {
  if (coins >= level * 50) {
    level++;
    levelUpEffect();
    if (level % 50 === 0) diamonds++;
  }
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond++;
    cost = Math.floor(cost * 1.5);
    update();
  }
}

function buySuper() {
  if (coins >= superCost) {
    coins -= superCost;
    perSecond += 5;
    superCost = Math.floor(superCost * 1.7);
    update();
  }
}

function buyAuto() {
  if (coins >= autoCost) {
    coins -= autoCost;
    perSecond += 10;
    autoCost = Math.floor(autoCost * 2);
    update();
  }
}

function boost() {
  boostMultiplier = 2;
  setTimeout(() => boostMultiplier = 1, 10000);
}

function daily() {
  coins += 5000;
  diamonds++;
  update();
}

function watchAdCoins() {
  coins += 5000;
  update();
}

function watchAdDiamonds() {
  diamonds++;
  update();
}

function rebirth() {
  if (coins >= 100000) {
    prestige++;
    coins = 0;
    perSecond = 0;
    level = 1;
    update();
  }
}

function resetGame() {
  location.reload();
}

setInterval(() => {
  coins += perSecond;
  update();
}, 1000);

update();
</script>

</body>
</html>
