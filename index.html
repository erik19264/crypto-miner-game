<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Miner Empire</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .game {
      width: 100%;
      max-width: 430px;
      background: #1e293b;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .panel {
      background: #111827;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 18px;
      text-align: center;
    }

    .btc {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .bps {
      font-size: 18px;
      opacity: 0.9;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 14px;
      transition: transform 0.08s ease, opacity 0.2s ease;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .upgrade-btn {
      background: linear-gradient(180deg, #16a34a, #15803d);
      color: white;
      box-shadow: 0 6px 0 #0f5c2b;
    }

    .upgrade-btn:disabled {
      background: #4b5563;
      box-shadow: 0 6px 0 #374151;
      cursor: not-allowed;
      opacity: 0.75;
    }

    .info {
      background: #111827;
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="game">
    <h1>Crypto Miner Empire</h1>

    <div class="panel">
      <div class="btc" id="btcText">BTC: 0</div>
      <div class="bps" id="bpsText">BTC/s: 1</div>
    </div>

    <button class="btn upgrade-btn" id="upgradeBtn">
      UPGRADE +1 BTC/s<br>
      <span id="upgradeCostText">COST: 10 BTC</span>
    </button>

    <div class="info">
      BTC se přičítá automaticky každou sekundu.  
      Upgrade zvýší těžbu o +1 BTC/s a cena se po každém nákupu zdvojnásobí.
    </div>
  </div>

  <script>
    const SAVE_KEY = "crypto_miner_empire_save";

    const game = {
      btc: 0,
      btcPerSecond: 1,
      upgradeCost: 10
    };

    function loadGame() {
      const saved = localStorage.getItem(SAVE_KEY);
      if (!saved) return;

      try {
        const parsed = JSON.parse(saved);
        if (typeof parsed.btc === "number") game.btc = parsed.btc;
        if (typeof parsed.btcPerSecond === "number") game.btcPerSecond = parsed.btcPerSecond;
        if (typeof parsed.upgradeCost === "number") game.upgradeCost = parsed.upgradeCost;
      } catch (e) {
        console.error("Chyba při načítání uložené hry:", e);
      }
    }

    function saveGame() {
      localStorage.setItem(SAVE_KEY, JSON.stringify(game));
    }

    function formatNumber(value) {
      if (value >= 1_000_000_000) return (value / 1_000_000_000).toFixed(2) + "B";
      if (value >= 1_000_000) return (value / 1_000_000).toFixed(2) + "M";
      if (value >= 1_000) return (value / 1_000).toFixed(2) + "K";
      return Math.floor(value).toString();
    }

    function updateUI() {
      document.getElementById("btcText").textContent = "BTC: " + formatNumber(game.btc);
      document.getElementById("bpsText").textContent = "BTC/s: " + formatNumber(game.btcPerSecond);
      document.getElementById("upgradeCostText").textContent = "COST: " + formatNumber(game.upgradeCost) + " BTC";

      const upgradeBtn = document.getElementById("upgradeBtn");
      upgradeBtn.disabled = game.btc < game.upgradeCost;
    }

    function buyUpgrade() {
      if (game.btc < game.upgradeCost) return;

      game.btc -= game.upgradeCost;
      game.btcPerSecond += 1;
      game.upgradeCost *= 2;

      updateUI();
      saveGame();
    }

    function tick() {
      game.btc += game.btcPerSecond;
      updateUI();
      saveGame();
    }

    document.getElementById("upgradeBtn").addEventListener("click", buyUpgrade);

    loadGame();
    updateUI();

    setInterval(tick, 1000);
  </script>
</body>
</html>
