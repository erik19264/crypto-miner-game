<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Miner</title>

<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
  margin: 0;
  padding: 20px;
  transition: 0.15s;
}

h1 {
  font-size: 6vw;
  color: #facc15;
}

.subtitle {
  opacity: 0.6;
  margin-top: -10px;
  letter-spacing: 2px;
}

button {
  padding: 12px;
  margin: 6px;
  border-radius: 12px;
  border: none;
  color: white;
  width: 45%;
}

.mine { background: #22c55e; width: 70%; }
.blue { background: #3b82f6; }
.orange { background: #f59e0b; }
.red { background: #ef4444; }
.purple { background: #8b5cf6; }

.row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.barWrap {
  background: #1e293b;
  height: 12px;
  width: 80%;
  margin: 10px auto;
  border-radius: 10px;
}

.bar {
  background: #22c55e;
  height: 100%;
  width: 0%;
  border-radius: 10px;
}

#effects {
  position: fixed;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.coinEffect {
  position: absolute;
  font-size: 20px;
  animation: floatUp 1s forwards;
}

@keyframes floatUp {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-60px); }
}
</style>
</head>

<body>

<div id="effects"></div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.wav"></audio>
<audio id="upgradeSound" src="https://assets.mixkit.co/sfx/preview/mixkit-video-game-power-up-3164.wav"></audio>
<audio id="levelSound" src="https://assets.mixkit.co/sfx/preview/mixkit-game-level-completed-2059.wav"></audio>

<h1>💰 Crypto Miner</h1>
<p class="subtitle">Empire</p>

<h2>Coins: <span id="coins">0</span></h2>
<h3>Diamonds: <span id="diamonds">0</span></h3>
<h3>Coins/sec: <span id="perSecond">0</span></h3>
<h3>Level: <span id="level">1</span></h3>

<div class="barWrap">
  <div id="levelBar" class="bar"></div>
</div>

<button class="mine" onclick="mine()">⛏️ Těžit</button>

<div class="row">
  <button class="orange" onclick="boost()">🚀 Boost</button>
  <button class="purple" onclick="daily()">🎁 Daily</button>
</div>

<script>
let coins = 0;
let diamonds = 0;
let perSecond = 0;
let level = 1;

let boostMultiplier = 1;

// CRIT
let critChance = 0.15;
let critMultiplier = 5;

const coinsEl = document.getElementById("coins");
const diamondsEl = document.getElementById("diamonds");
const perSecondEl = document.getElementById("perSecond");
const levelEl = document.getElementById("level");
const levelBar = document.getElementById("levelBar");

const clickSound = document.getElementById("clickSound");
const upgradeSound = document.getElementById("upgradeSound");
const levelSound = document.getElementById("levelSound");

function playSound(a) {
  a.currentTime = 0;
  a.play();
}

function currentIncomeMultiplier() {
  return boostMultiplier;
}

function showCoinEffect() {
  const el = document.createElement("div");
  el.className = "coinEffect";
  el.innerText = "💰";
  el.style.left = Math.random() * window.innerWidth + "px";
  el.style.top = "60%";
  document.getElementById("effects").appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function levelUpEffect() {
  document.body.style.background = "#14532d";
  setTimeout(() => {
    document.body.style.background = "#0f172a";
  }, 150);
}

function mine() {
  let amount = 1 * currentIncomeMultiplier();

  // CRIT
  if (Math.random() < critChance) {
    amount *= critMultiplier;

    document.body.style.background = "#78350f";
    setTimeout(() => {
      document.body.style.background = "#0f172a";
    }, 100);
  }

  coins += amount;

  if (navigator.vibrate) navigator.vibrate(20);

  playSound(clickSound);
  showCoinEffect();
  checkLevel();
  update();
}

function checkLevel() {
  if (coins >= level * 50) {
    level++;
    playSound(levelSound);
    levelUpEffect();

    if (level % 50 === 0) diamonds++;
  }
}

function boost() {
  boostMultiplier = 2;
  playSound(upgradeSound);

  setTimeout(() => {
    boostMultiplier = 1;
  }, 10000);
}

function daily() {
  coins += 5000;
  diamonds++;
  playSound(upgradeSound);
  update();
}

function update() {
  coinsEl.innerText = Math.floor(coins);
  diamondsEl.innerText = diamonds;
  perSecondEl.innerText = perSecond;
  levelEl.innerText = level;

  levelBar.style.width = (coins % 50) * 2 + "%";
}

setInterval(() => {
  coins += perSecond;
  update();
}, 1000);

update();
</script>

</body>
</html>
