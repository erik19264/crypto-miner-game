<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
      padding: 20px;
    }

    button {
      padding: 12px;
      margin: 5px;
      border-radius: 10px;
      border: none;
      color: white;
      width: 45%;
    }

    .mine { background: #22c55e; width: 70%; }
    .upgrade { background: #3b82f6; }
    .boost { background: #f59e0b; }
    .reset { background: #ef4444; }
    .reward { background: #8b5cf6; }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .screen { display: none; }
    .active { display: block; }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<h2>Coins: <span id="coins">0</span></h2>
<h3>Diamonds: <span id="diamonds">0</span></h3>
<h3>Coins/sec: <span id="perSecond">0</span></h3>
<h3>Level: <span id="level">1</span></h3>

<div style="background:#1e293b; border-radius:10px; height:12px; width:80%; margin:10px auto;">
  <div id="levelBar" style="background:#22c55e; height:100%; width:0%; border-radius:10px;"></div>
</div>

<div class="row">
  <button class="upgrade" onclick="showGame()">🎮 Hra</button>
  <button class="upgrade" onclick="showShop()">🛒 Shop</button>
</div>

<div id="gameScreen" class="screen active">
  <button class="mine" onclick="mine()">⛏️ Těžit</button>

  <div class="row">
    <button id="boostBtn" class="boost" onclick="activateBoost()">🚀 Boost</button>
    <button id="dailyBtn" class="reward" onclick="claimDailyReward()">🎁 Daily</button>
  </div>

  <button class="reset" onclick="resetGame()">🗑️ Reset</button>
</div>

<div id="shopScreen" class="screen">

  <div class="row">
    <button class="upgrade" onclick="buyUpgrade()">
      ⚡ +1/sec<br>Cost: <span id="cost">10</span>
    </button>

    <button class="upgrade" onclick="buySuperUpgrade()">
      💎 +5/sec<br>Cost: <span id="superCost">100</span>
    </button>
  </div>

  <div class="row">
    <button class="upgrade" onclick="buyAutoClicker()">
      🤖 +10/sec<br>Cost: <span id="autoCost">500</span>
    </button>
  </div>

  <div class="row">
    <button class="upgrade" onclick="buyCoinsWithDiamonds()">
      💎 +1000 coins<br>(1 diamond)
    </button>

    <button class="upgrade" onclick="buyDiamondBoost()">
      💎 x2 boost 30s<br>(2 diamonds)
    </button>
  </div>

</div>

<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let diamonds = parseInt(localStorage.getItem("diamonds")) || 0;
let perSecond = parseInt(localStorage.getItem("perSecond")) || 0;
let cost = parseInt(localStorage.getItem("cost")) || 10;
let superCost = parseInt(localStorage.getItem("superCost")) || 100;
let autoCost = parseInt(localStorage.getItem("autoCost")) || 500;
let level = parseInt(localStorage.getItem("level")) || 1;

let boostActive = false;
let boostCooldown = false;
let boostMultiplier = 1;
let boostCooldownRemaining = 0;

let lastDailyClaim = parseInt(localStorage.getItem("lastDailyClaim")) || 0;

function showGame() {
  gameScreen.classList.add("active");
  shopScreen.classList.remove("active");
}

function showShop() {
  shopScreen.classList.add("active");
  gameScreen.classList.remove("active");
}

function update() {
  coinsEl.innerText = coins;
  diamondsEl.innerText = diamonds;
  perSecondEl.innerText = perSecond;
  costEl.innerText = cost;
  superCostEl.innerText = superCost;
  autoCostEl.innerText = autoCost;
  levelEl.innerText = level;

  let progress = (coins % (level*50)) / (level*50) * 100;
  levelBar.style.width = progress + "%";

  let now = Date.now();
  let diff = now - lastDailyClaim;

  if (diff > 86400000) {
    dailyBtn.innerText = "🎁 Daily";
    dailyBtn.disabled = false;
  } else {
    let h = Math.floor((86400000-diff)/3600000);
    let m = Math.floor(((86400000-diff)%3600000)/60000);
    dailyBtn.innerText = h+"h "+m+"m";
    dailyBtn.disabled = true;
  }
}

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("diamonds", diamonds);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.setItem("superCost", superCost);
  localStorage.setItem("autoCost", autoCost);
  localStorage.setItem("level", level);
  localStorage.setItem("lastDailyClaim", lastDailyClaim);
}

function checkLevel() {
  while (coins >= level * 50) {
    level++;
    if (level % 25 === 0) diamonds++;
  }
}

function mine() {
  coins += 1 * boostMultiplier;
  checkLevel();
  save();
  update();
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond++;
    cost *= 1.5;
    save(); update();
  }
}

function buySuperUpgrade() {
  if (coins >= superCost) {
    coins -= superCost;
    perSecond += 5;
    superCost *= 1.7;
    save(); update();
  }
}

function buyAutoClicker() {
  if (coins >= autoCost) {
    coins -= autoCost;
    perSecond += 10;
    autoCost *= 2;
    save(); update();
  }
}

function buyCoinsWithDiamonds() {
  if (diamonds >= 1) {
    diamonds--;
    coins += 1000;
    save(); update();
  }
}

function buyDiamondBoost() {
  if (diamonds >= 2) {
    diamonds -= 2;
    boostMultiplier = 2;
    setTimeout(()=> boostMultiplier=1,30000);
    save(); update();
  }
}

function claimDailyReward() {
  if (Date.now() - lastDailyClaim > 86400000) {
    coins += 5000;
    diamonds++;
    lastDailyClaim = Date.now();
    save(); update();
  }
}

function activateBoost() {
  if (boostActive || boostCooldown) return;

  boostActive = true;
  boostCooldown = true;
  boostMultiplier = 2;
  boostCooldownRemaining = 30;

  setTimeout(()=>{ boostMultiplier=1; boostActive=false; },10000);

  let i = setInterval(()=>{
    boostCooldownRemaining--;
    if (boostCooldownRemaining<=0){
      clearInterval(i);
      boostCooldown=false;
    }
    update();
  },1000);
}

setInterval(()=>{
  coins += perSecond * boostMultiplier;
  checkLevel();
  save();
  update();
},1000);

update();
</script>

</body>
</html>
