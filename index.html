<!DOCTYPE html>
<html lang="cs">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Miner Empire</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1830;
  color:white;
  text-align:center;
}

.container{
  max-width:360px;
  margin:auto;
  padding:10px;
}

h1{
  font-size:18px;
  margin-bottom:10px;
}

button{
  border:none;
  border-radius:15px;
  padding:12px;
  margin:5px;
  font-weight:bold;
  color:white;
}

.coin{
  width:180px;
  height:180px;
  border-radius:50%;
  font-size:50px;
  background:#7c3aed;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:#111827;
  padding:10px;
  border-radius:15px;
}

.hidden{display:none}

.bottom{
  position:fixed;
  bottom:0;
  width:100%;
  background:#111827;
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.bottom button{
  background:none;
}
</style>
</head>

<body>

<div class="container">

<h1>Crypto Miner Empire</h1>

<div id="home">

<button class="coin" onclick="mine()">CM</button>

<h2 id="coins">0</h2>
<p>≈ <span id="czk">0</span> Kč</p>

<p>Level: <span id="level">1</span></p>
<p>XP: <span id="xp">0</span>/<span id="xpNeed">50</span></p>

<div class="grid">
<button onclick="boost()">BOOST</button>
<button onclick="daily()">DAILY</button>
<button onclick="adCoins()">+5000</button>
<button onclick="adDiamond()">+1💎</button>
</div>

</div>

<div id="shop" class="hidden">
<div class="card">
<h3>Shop</h3>
<button onclick="buyClick()">+1 click (<span id="clickCost">10</span>)</button>
<button onclick="buyCrit()">Crit (<span id="critCost">5</span>💎)</button>
</div>
</div>

<div id="bonus" class="hidden">
<div class="card">
<button onclick="rebirth()">REBIRTH</button>
<button onclick="reset()">RESET</button>
</div>
</div>

<div id="withdraw" class="hidden">
<h2><span id="coins2">0</span> coins</h2>
<p><span id="czk2">0</span> Kč</p>
<input id="wInput" type="number" value="1">
<p>≈ <span id="wCzk">0</span> Kč</p>
<button onclick="withdraw()">VYBRAT</button>
</div>

</div>

<div class="bottom">
<button onclick="show('home')">🏠</button>
<button onclick="show('shop')">🛒</button>
<button onclick="show('bonus')">🎁</button>
<button onclick="show('withdraw')">💰</button>
</div>

<script>

const RATE = 0.03

let coins = 0
let diamonds = 0

let click = 1
let clickCost = 10

let crit = 0.15
let critCost = 5

let level = 1
let xp = 0
let xpNeed = 50

let boostActive = false

function save(){
localStorage.setItem("coins",coins)
localStorage.setItem("diamonds",diamonds)
localStorage.setItem("click",click)
localStorage.setItem("level",level)
localStorage.setItem("xp",xp)
}

function load(){
coins = parseFloat(localStorage.getItem("coins")) || 0
diamonds = parseInt(localStorage.getItem("diamonds")) || 0
click = parseFloat(localStorage.getItem("click")) || 1
level = parseInt(localStorage.getItem("level")) || 1
xp = parseInt(localStorage.getItem("xp")) || 0
}

function mine(){
let value = click

if(Math.random() < crit){
value *= 5
}

if(boostActive){
value *= 2
}

coins += value
xp++

if(xp >= xpNeed){
xp = 0
level++
xpNeed = Math.floor(xpNeed*1.3)
diamonds++
}

update()
save()
}

function buyClick(){
if(coins >= clickCost){
coins -= clickCost
click++
clickCost = Math.floor(clickCost*1.6)
}
update()
}

function buyCrit(){
if(diamonds >= critCost){
diamonds -= critCost
crit += 0.05
critCost += 3
}
update()
}

function boost(){
boostActive = true
setTimeout(()=>boostActive=false,10000)
}

function daily(){
coins += 5000
diamonds++
update()
}

function adCoins(){
coins += 5000
update()
}

function adDiamond(){
diamonds++
update()
}

function rebirth(){
if(coins >= 100000){
coins = 0
click *= 1.2
}
update()
}

function reset(){
localStorage.clear()
location.reload()
}

function withdraw(){
alert("Výběr odeslán (fake)")
}

function show(id){
["home","shop","bonus","withdraw"].forEach(x=>{
document.getElementById(x).classList.add("hidden")
})
document.getElementById(id).classList.remove("hidden")
}

function update(){
document.getElementById("coins").innerText = Math.floor(coins)
document.getElementById("coins2").innerText = Math.floor(coins)

document.getElementById("czk").innerText = (coins*RATE).toFixed(2)
document.getElementById("czk2").innerText = (coins*RATE).toFixed(2)

document.getElementById("level").innerText = level
document.getElementById("xp").innerText = xp
document.getElementById("xpNeed").innerText = xpNeed

document.getElementById("clickCost").innerText = clickCost
document.getElementById("critCost").innerText = critCost

let w = document.getElementById("wInput").value
document.getElementById("wCzk").innerText = (w*RATE).toFixed(2)
}

load()
update()

</script>

</body>
</html>
