<!DOCTYPE html>
<html>
<head>
  <title>Crypto Miner Empire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    h1 {
      margin-top: 40px;
    }

    button {
      padding: 15px;
      font-size: 18px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      color: white;
    }

    .mine {
      background: #22c55e;
    }

    .upgrade {
      background: #3b82f6;
    }

    .reset {
      background: #ef4444;
    }
  </style>
</head>

<body>

<h1>💰 Crypto Miner Empire</h1>

<h2 id="coins">Coins: 0</h2>
<h3 id="perSec">Coins/sec: 0</h3>

<button class="mine" onclick="mine()">⛏️ Těžit</button>

<br>

<button class="upgrade" onclick="buyUpgrade()">⚡ Upgrade (+1/sec) – Cost: <span id="cost">10</span></button>

<br>

<button class="reset" onclick="resetGame()">🗑️ Reset hry</button>
<br>
<button onclick="activateBoost()" style="background:#f59e0b;">
🚀 x2 Boost (10s)
</button>
<script>
let coins = parseInt(localStorage.getItem("coins")) || 0;
let perSecond = parseInt(localStorage.getItem("perSecond")) || 0;
let cost = parseInt(localStorage.getItem("cost")) || 10;
let boostActive = false;
let boostMultiplier = 1;
// OFFLINE EARNINGS
let lastTime = localStorage.getItem("lastTime");

if (lastTime) {
  let now = Date.now();
  let diff = Math.floor((now - lastTime) / 1000);
  coins += diff * perSecond;
}

function update() {
  document.getElementById("coins").innerText = "Coins: " + coins;
  document.getElementById("perSec").innerText = "Coins/sec: " + perSecond;
  document.getElementById("cost").innerText = cost;
}

function mine() {
  coins++;
  save();
}

function buyUpgrade() {
  if (coins >= cost) {
    coins -= cost;
    perSecond++;
    cost = Math.floor(cost * 1.5);
    save();
  }
}

function resetGame() {
  coins = 0;
  perSecond = 0;
  cost = 10;
  localStorage.setItem("coins", coins);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.removeItem("lastTime");
  update();
}

function save() {
  localStorage.setItem("coins", coins);
  localStorage.setItem("perSecond", perSecond);
  localStorage.setItem("cost", cost);
  localStorage.setItem("lastTime", Date.now());
  update();
}

// AUTO INCOME
setInterval(() => {
  coins += perSecond * boostMultiplier;
  save();
}, 1000);

update();
</scriptfunction activateBoost() {
  if (boostActive) return;

  boostActive = true;
  boostMultiplier = 2;

  setTimeout(() => {
    boostMultiplier = 1;
    boostActive = false;
  }, 10000);
}> 

</body>
</html>
